<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Ação</title>
  <link rel="stylesheet" href="../../design-system/css/globals.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="page">
    <button class="back-button" type="button" aria-label="Voltar para a página anterior">
      <span aria-hidden="true">↩</span>
      Voltar
    </button>

    <section class="action-card" aria-labelledby="form-title">
      <div class="illustration" aria-hidden="true">
        <img class="illustration__image" src="./img/undraw_my-resume_etai-1.svg" alt="">
      </div>

      <form class="action-form" id="criarAcaoForm">
        <header class="form-header">
          <h1 id="form-title">Criar ação</h1>
          <p>Crie uma ação e anuncie para encontrar voluntários</p>
        </header>

        <label class="field">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </span>
          <input type="text" id="nomeAcao" name="nomeAcao" placeholder="Digite um nome para a ação" required>
        </label>

        <label class="field">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M20 10c0 4.99-5.53 10.2-7.36 11.8a1 1 0 0 1-1.28 0C9.53 20.2 4 14.99 4 10a8 8 0 1 1 16 0Z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
          </span>
          <input type="text" id="localizacao" name="localizacao" placeholder="Digite a localização onde a ação acontecerá" required>
        </label>

        <label class="field">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <rect x="3" y="4" width="18" height="18" rx="2"></rect>
              <path d="M16 2v4"></path>
              <path d="M8 2v4"></path>
              <path d="M3 10h18"></path>
            </svg>
          </span>
          <input type="date" id="dataAcao" name="dataAcao" required>
        </label>

        <label class="field field--textarea">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M4 7h10"></path>
              <path d="M4 12h7"></path>
              <path d="M4 17h5"></path>
              <path d="M16 15l2 2 4-4"></path>
            </svg>
          </span>
          <textarea id="descricao" name="descricao" placeholder="Digite a descrição da ação" rows="4" required></textarea>
        </label>

        <label class="field field--tags">
          <span class="field__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M20.59 13.41 11 3.83A2.82 2.82 0 0 0 9 3H4a1 1 0 0 0-1 1v5a2.82 2.82 0 0 0 .83 2l9.58 9.59a2 2 0 0 0 2.83 0l4.35-4.35a2 2 0 0 0 0-2.83Z"></path>
              <path d="M7.5 7.5h.01"></path>
            </svg>
          </span>
          <span class="tags-control">
            <span class="tags-control__label">Selecione tags ligadas com a ação</span>
            <input type="text" id="tags" name="tags" placeholder="Ex: Idosos, Comida" aria-describedby="tagsHelp">
            <small id="tagsHelp">Separe as tags por vírgula.</small>
          </span>
        </label>

        <p class="feedback" id="feedback" role="status" aria-live="polite"></p>

        <button class="submit-button" type="submit">Concluir</button>
      </form>
    </section>
  </main>

  <script src="./js/criar-acao.js"></script>
</body>
</html>
